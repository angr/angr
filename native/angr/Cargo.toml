[package]
name = "angr"
version = "0.1.0"
edition = "2024"

[lib]
name = "rustylib"
crate-type = ["cdylib"]

[dependencies]
backtrace = "0.3.76"
icicle-fuzzing = { git = "https://github.com/rileyseefeldt/icicle-emu.git", rev = "fa04ad5b16b7dc28c02c13b4fd52b8bcb40e3eb1" }
icicle-vm = { git = "https://github.com/rileyseefeldt/icicle-emu.git", rev = "fa04ad5b16b7dc28c02c13b4fd52b8bcb40e3eb1" }
libafl = { version = "=0.15.4" }
libafl_bolts = { version = "=0.15.4" }
pcode = { git = "https://github.com/rileyseefeldt/icicle-emu.git", rev = "fa04ad5b16b7dc28c02c13b4fd52b8bcb40e3eb1" }
postcard = { version = "1.1.3", default-features = false, features = ["use-std"] }
pyo3 = { version = "0.28.2", features = ["py-clone"] }
rangemap = "1.7.1"
send_wrapper = "0.6.0"
indexmap = "2.2"
fixedbitset = "0.5"
serde = { version = "1.0.228", features = ["derive"] }
target-lexicon = "0.13.5"

[dev-dependencies]
tempfile = "3.27.0"
