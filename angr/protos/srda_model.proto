syntax = "proto3";

import "angr/protos/ail_types.proto";

package angr.protos;

// Only the scan inputs are serialized. Everything else on SRDAModel (varid_to_vvar, all_vvar_definitions,
// all_vvar_uses, all_tmp_definitions, all_tmp_uses, phi_vvar_ids, phivarid_to_varids{,_with_unknown},
// vvar_uses_by_loc) is derived by a linear scan over the AIL graph and is reconstructed at parse time via
// ``angr.analyses.s_reaching_definitions.populate_model``.
message SRDAModel {
    // arch is reattached from the parent Project at parse time; the name is stored as a hint so callers can detect
    // a mismatch when reconstructing.
    optional string arch_name = 1;

    optional AilGraph func_graph = 2;  // networkx.DiGraph[ailment.Block]
    optional VVarSet func_args = 3;    // set[ailment.VirtualVariable] | None
    bool track_tmps = 4;               // whether the tmp-tracking scan populated the tmp dicts
}
