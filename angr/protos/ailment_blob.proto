syntax = "proto3";

package angr.protos;

// AilmentBlob is a versioned, opaque payload used to carry ailment-typed state through the protobuf schema during
// the bridging period before the ailment data classes are ported to Rust. The proto field number / message shape
// is stable; only the encoding format inside ``data`` changes.
//
// format_version:
//   1 = Python pickle (current default while ailment is pure Python)
//   2 = (reserved) Rust serde encoding once the ailment Rust port is in place
//
// Slots using AilmentBlob:
//   - SRDAModel.func_graph, func_args, varid_to_vvar, all_vvar_uses, all_tmp_uses
//   - Clinic.{graph, cc_graph, unoptimized_graph, _ail_graph, _init_ail_graph,
//             _blocks_by_addr_and_size, arg_vvars, _init_arg_vvars, func_args, _type_hints}
//   - DecompilationCache.arg_vvars, ite_exprs
//   - Codegen CConstruct subclasses with ailment payloads (CAILBlock, CDirtyExpression, ...)
message AilmentBlob {
    int32 format_version = 1;
    bytes data = 2;
}
